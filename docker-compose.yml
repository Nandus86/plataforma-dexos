services:
  exousia-postgres:
    image: postgres:16-alpine
    container_name: exousia-postgres
    restart: unless-stopped
    ports:
      - "5534:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-exousia}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-exousia123}
      POSTGRES_DB: ${POSTGRES_DB:-exousia_db}
    volumes:
      - exousia_postgres_data:/var/lib/postgresql/data
    networks:
      - exousia-network

  exousia-redis:
    image: redis:7-alpine
    container_name: exousia-redis
    restart: unless-stopped
    ports:
      - "6481:6379"
    volumes:
      - exousia_redis_data:/data
    command: redis-server --appendonly yes
    networks:
      - exousia-network

  exousia-minio:
    image: minio/minio:latest
    container_name: exousia-minio
    restart: unless-stopped
    ports:
      - "9100:9000"
      - "9101:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-exousia}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-exousia123}
    volumes:
      - exousia_minio_data:/data
    command: server /data --console-address ":9001"
    networks:
      - exousia-network

  exousia-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: exousia-backend
    restart: unless-stopped
    ports:
      - "8010:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-exousia}:${POSTGRES_PASSWORD:-exousia123}@exousia-postgres:5432/${POSTGRES_DB:-exousia_db}
      - REDIS_URL=redis://exousia-redis:6379
      # - WEAVIATE_URL=http://exousia-weaviate:8080
      - MINIO_ENDPOINT=exousia-minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ROOT_USER:-exousia}
      - MINIO_SECRET_KEY=${MINIO_ROOT_PASSWORD:-exousia123}
      - SECRET_KEY=${SECRET_KEY:-exousia-secret-key-change-in-production}
    depends_on:
      - exousia-postgres
      - exousia-redis
    volumes:
      - ./backend:/app
    networks:
      - exousia-network

  exousia-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: exousia-frontend
    restart: unless-stopped
    ports:
      - "4200:4200"
    volumes:
      - ./frontend/src:/app/src
    networks:
      - exousia-network

  exousia-biometrics:
    build:
      context: ./biometrics
      dockerfile: Dockerfile
    container_name: exousia-biometrics
    restart: unless-stopped
    ports:
      - "9500:9500"
    environment:
      - EXOUSIA_API_URL=http://exousia-backend:8000
      - BRIDGE_PORT=9500
      - GATEWAY_URL=http://hik-gateway:8081
    depends_on:
      - hik-gateway
    networks:
      - exousia-network

  hik-gateway:
    build:
      context: ./hik-gateway
      dockerfile: Dockerfile
    container_name: hik-gateway
    restart: unless-stopped
    ports:
      - "7660:7660/tcp"
      - "7660:7660/udp"
      - "7661:7661/tcp"
      - "7661:7661/udp"
      - "7662:7662/tcp"
      - "7662:7662/udp"
      - "7663:7663/tcp"
      - "7663:7663/udp"
      - "7664:7664/tcp"
      - "7664:7664/udp"
      - "7665:7665/tcp"
      - "7665:7665/udp"
      - "8081:8081"
      - "8888:80"
    privileged: true
    cap_add:
      - NET_ADMIN
      - NET_RAW
    sysctls:
      - net.ipv4.ip_local_port_range=1024 65535
      - net.ipv4.tcp_tw_reuse=1
      - net.ipv4.tcp_fin_timeout=30
    networks:
      - exousia-network

volumes:
  exousia_postgres_data:
  exousia_redis_data:
  exousia_minio_data:


networks:
  exousia-network:
    driver: bridge
