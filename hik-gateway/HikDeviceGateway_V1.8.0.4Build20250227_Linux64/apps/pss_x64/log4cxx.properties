########################################

##        以下为运行日志的配置        ##

##        运行日志按级别输出          ##

########################################

##   级别fatal（致命错误）的日志输出配置
log4j.appender.default_fatal=org.apache.log4j.RollingFileAppender
log4j.appender.default_fatal.File=./logs/pss_0.1.fatal.log
log4j.appender.default_fatal.MaxFileSize=25MB
log4j.appender.default_fatal.MaxBackupIndex=10
log4j.appender.default_fatal.Append=true
log4j.appender.default_fatal.Threshold=FATAL
log4j.appender.default_fatal.layout=org.apache.log4j.PatternLayout
log4j.appender.default_fatal.layout.ConversionPattern=%d{yyyy-MM-ddTHH:mm:ss.SSSZ}   %-p %.16c [%t] %m%n

##   级别error（错误）的日志输出配置
log4j.appender.default_error=org.apache.log4j.RollingFileAppender
log4j.appender.default_error.File=./logs/pss_0.1.error.log
log4j.appender.default_error.MaxFileSize=25MB
log4j.appender.default_error.MaxBackupIndex=10
log4j.appender.default_error.Append=true
log4j.appender.default_error.Threshold=ERROR
log4j.appender.default_error.layout=org.apache.log4j.PatternLayout
log4j.appender.default_error.layout.ConversionPattern=%d{yyyy-MM-ddTHH:mm:ss.SSSZ}   %-p %.16c [%t] %m%n

##   级别warn（警告）的日志输出配置
log4j.appender.default_warn=org.apache.log4j.RollingFileAppender
log4j.appender.default_warn.File=./logs/pss_0.1.warn.log
log4j.appender.default_warn.MaxFileSize=25MB
log4j.appender.default_warn.MaxBackupIndex=10
log4j.appender.default_warn.Append=true
log4j.appender.default_warn.Threshold=WARN
log4j.appender.default_warn.layout=org.apache.log4j.PatternLayout
log4j.appender.default_warn.layout.ConversionPattern=%d{yyyy-MM-ddTHH:mm:ss.SSSZ}   %-p %.16c [%t] %m%n

##   级别info（信息）的日志输出配置
log4j.appender.default_info=org.apache.log4j.RollingFileAppender
log4j.appender.default_info.File=../../logs/pss/pss_0.1.info.log
log4j.appender.default_info.MaxFileSize=25MB
log4j.appender.default_info.MaxBackupIndex=10
log4j.appender.default_info.Append=true
log4j.appender.default_info.Threshold=INFO
log4j.appender.default_info.layout=org.apache.log4j.PatternLayout
log4j.appender.default_info.layout.ConversionPattern=%d{yyyy-MM-ddTHH:mm:ss.SSSZ}   %-p %.16c [%t] %m%n

##   级别debug（调试）的日志输出配置
log4j.appender.default_debug=org.apache.log4j.RollingFileAppender
log4j.appender.default_debug.File=../../logs/pss/pss_0.1.debug.log
log4j.appender.default_debug.MaxFileSize=25MB
log4j.appender.default_debug.MaxBackupIndex=10
log4j.appender.default_debug.Append=true
log4j.appender.default_debug.Threshold=DEBUG
log4j.appender.default_debug.layout=org.apache.log4j.PatternLayout
log4j.appender.default_debug.layout.ConversionPattern=%d{yyyy-MM-ddTHH:mm:ss.SSSZ}   %-p %.16c [%t] %m%n

##   级别trace（调试跟踪）的日志输出配置
log4j.appender.default_trace=org.apache.log4j.RollingFileAppender
log4j.appender.default_trace.File=../../logs/pss/pss_0.1.trace.log
log4j.appender.default_trace.MaxFileSize=25MB
log4j.appender.default_trace.MaxBackupIndex=10
log4j.appender.default_trace.Append=true
log4j.appender.default_trace.Threshold=TRACE
log4j.appender.default_trace.layout=org.apache.log4j.PatternLayout
log4j.appender.default_trace.layout.ConversionPattern=%d{yyyy-MM-ddTHH:mm:ss.SSSZ}   %-p %.16c [%t] %m%n

#Console  
log4j.appender.Console=org.apache.log4j.ConsoleAppender  
log4j.appender.Console.layout=org.apache.log4j.PatternLayout  
log4j.appender.Console.Threshold=ERROR
log4j.appender.Console.layout.ConversionPattern=%d{yyyy-MM-ddTHH:mm:ss.SSSZ}   %-p %.16c [%t] %m%n

