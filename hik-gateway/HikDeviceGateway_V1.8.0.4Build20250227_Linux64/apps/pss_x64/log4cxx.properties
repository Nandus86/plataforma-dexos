#设置 DRVNET
log4j.logger.DRVNET=DEBUG, DRVNET
log4j.appender.DRVNET=org.apache.log4j.RollingFileAppender
log4j.appender.DRVNET.File=../../logs/pss/depend/drvnet.log
log4j.appender.DRVNET.MaxFileSize=25MB
log4j.appender.DRVNET.MaxBackupIndex=10
log4j.appender.DRVNET.Append=true
log4j.appender.DRVNET.Threshold=DEBUG
log4j.appender.DRVNET.layout=org.apache.log4j.PatternLayout
log4j.appender.DRVNET.layout.ConversionPattern=%d{yyyy-MM-ddTHH:mm:ss.SSSZ}   %-p %.16c [%t] %m%n
log4j.additivity.DRVNET=false

